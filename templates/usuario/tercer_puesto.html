{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    {% if partido.numero not in guardados %}

    <div class="card shadow-lg border-0">

        <div class="card-header bg-secondary text-white">

            <h3 class="mb-0">

                🥉 Partido por el Tercer Puesto

            </h3>

        </div>

        <div class="card-body">

            <form method="POST" action="{{ url_for('guardar_tercer_puesto') }}">

                <input type="hidden" name="equipo_local" value="{{ partido.local }}">

                <input type="hidden" name="equipo_visitante" value="{{ partido.visitante }}">
                <div class="row align-items-center mb-4">

                    <div class="col-md-5 text-center">

                        <h4 class="fw-bold">

                            {{ partido.local }}

                        </h4>

                    </div>

                    <div class="col-md-2 text-center">

                        <span class="badge bg-dark fs-6">

                            VS

                        </span>

                    </div>

                    <div class="col-md-5 text-center">

                        <h4 class="fw-bold">

                            {{ partido.visitante }}

                        </h4>

                    </div>

                </div>

                <div class="d-grid gap-3">

                    <input type="radio" class="btn-check" name="ganador" id="local{{ partido.numero }}" value="local"
                        required>

                    <label class="btn btn-outline-warning btn-lg" for="local{{ partido.numero }}">

                        🏆 Gana {{ partido.local }}

                    </label>

                    <input type="radio" class="btn-check" name="ganador" id="visitante{{ partido.numero }}"
                        value="visitante">

                    <label class="btn btn-outline-success btn-lg" for="visitante{{ partido.numero }}">

                        🏆 Gana {{ partido.visitante }}

                    </label>



                </div>

                <div class="text-center mt-4">

                    <button class="btn btn-success btn-lg">

                        Guardar Tercer Puesto

                    </button>

                </div>

            </form>

        </div>

    </div>

    {% endif %}

    {% if guardados|length == 1 %}

    <div class="text-center mt-4">

        <a href="{{ url_for('final_mundial') }}" class="btn btn-primary btn-lg">

            Ver Partido Final →

        </a>

    </div>

    {% endif %}

</div>

{% endblock %}
