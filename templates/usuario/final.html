{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg border-warning">

        <div class="card-header bg-warning text-center">

            <h2 class="mb-0">

                🏆 Gran Final

            </h2>

        </div>

        <div class="card-body">

            <form method="POST" action="{{ url_for('guardar_final') }}">

                <input type="hidden" name="equipo_local" value="{{ final.local }}">

                <input type="hidden" name="equipo_visitante" value="{{ final.visitante }}">

                <div class="row align-items-center mb-4">

                    <div class="col-md-5 text-center">

                        <h4 class="fw-bold">

                            {{ final.local }}

                        </h4>

                    </div>

                    <div class="col-md-2 text-center">

                        <span class="badge bg-dark fs-6">

                            VS

                        </span>

                    </div>

                    <div class="col-md-5 text-center">

                        <h4 class="fw-bold">

                            {{ final.visitante }}

                        </h4>

                    </div>

                </div>

                <div class="d-grid gap-3">

                    <input type="radio" class="btn-check" name="ganador" id="local{{ final.numero }}" value="local"
                        required>

                    <label class="btn btn-outline-warning btn-lg" for="local{{ final.numero }}">

                        🏆 Ganador {{ final.local }}

                    </label>

                    <input type="radio" class="btn-check" name="ganador" id="visitante{{ final.numero }}"
                        value="visitante">

                    <label class="btn btn-outline-success btn-lg" for="visitante{{ final.numero }}">

                        🏆 Ganador {{ final.visitante }}

                    </label>



                </div>

                <div class="text-center mt-4">

                    <button class="btn btn-success btn-lg">

                        🏆 Guardar Campeón

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
