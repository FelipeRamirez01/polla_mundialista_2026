{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg border-warning">

        <div class="card-header bg-warning text-center">

            <h2 class="mb-0">

                🏆 Gran Final

            </h2>

        </div>

        <div class="card-body">

            <form method="POST" action="{{ url_for('guardar_eliminatoria') }}">

                <input type="hidden" name="numero_partido" value="{{ final.numero }}">

                <input type="hidden" name="fase" value="Final">

                <input type="hidden" name="equipo_local" value="{{ final.local }}">

                <input type="hidden" name="equipo_visitante" value="{{ final.visitante }}">

                <div class="row align-items-center mb-4">

                    <div class="col-md-5 text-center">

                        <h3 class="fw-bold text-warning">

                            {{ final.local }}

                        </h3>

                    </div>

                    <div class="col-md-2 text-center">

                        <span class="badge bg-dark fs-6">

                            VS

                        </span>

                    </div>

                    <div class="col-md-5 text-center">

                        <h3 class="fw-bold text-warning">

                            {{ final.visitante }}

                        </h3>

                    </div>

                </div>

                <div class="row mb-4">

                    <div class="col-md-6">

                        <label class="form-label fw-bold">

                            Goles {{ final.local }}

                        </label>

                        <input type="number" class="form-control form-control-lg" name="goles_local" id="goles_local"
                            min="0" required>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label fw-bold">

                            Goles {{ final.visitante }}

                        </label>

                        <input type="number" class="form-control form-control-lg" name="goles_visitante"
                            id="goles_visitante" min="0" required>

                    </div>

                </div>

                <div id="penales" class="mt-4" style="display:none;">

                    <div class="alert alert-warning text-center">

                        ⚽ El partido terminó empatado.
                        Seleccione quién gana la Copa por penales.

                    </div>

                    <div class="d-grid gap-3">

                        <input type="radio" class="btn-check" name="ganador_penales" id="penal_local" value="local">

                        <label class="btn btn-outline-warning btn-lg" for="penal_local">

                            🏆 Campeón {{ final.local }}

                        </label>

                        <input type="radio" class="btn-check" name="ganador_penales" id="penal_visitante"
                            value="visitante">

                        <label class="btn btn-outline-success btn-lg" for="penal_visitante">

                            🏆 Campeón {{ final.visitante }}

                        </label>

                    </div>

                </div>

                <div class="text-center mt-4">

                    <button class="btn btn-success btn-lg w-100">

                        🏆 Guardar Campeón

                    </button>

                </div>
               

            </form>


        </div>

    </div>

</div>

<script>

document.addEventListener('DOMContentLoaded', function() {

    const local = document.getElementById('goles_local');
    const visitante = document.getElementById('goles_visitante');
    const penales = document.getElementById('penales');

    function validarEmpate() {

        if (
            local.value !== '' &&
            visitante.value !== '' &&
            local.value === visitante.value
        ) {

            penales.style.display = 'block';

        } else {

            penales.style.display = 'none';

            document.querySelectorAll(
                '#penales input[type=radio]'
            ).forEach(r => r.checked = false);

        }

    }

    local.addEventListener('input', validarEmpate);
    visitante.addEventListener('input', validarEmpate);

});

</script>


{% endblock %}
