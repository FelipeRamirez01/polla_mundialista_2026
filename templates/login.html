<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Polla Mundialista 2026</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            min-height:100vh;
            background: linear-gradient(
                135deg,
                #0d6efd,
                #198754
            );
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            border:none;
            border-radius:20px;
            overflow:hidden;
        }

        .card-header{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:25px;
        }

        .logo{
            font-size:4rem;
        }

        .btn-login{
            border-radius:12px;
            padding:12px;
            font-weight:bold;
        }

        .btn-register{
            border-radius:12px;
            padding:12px;
            font-weight:bold;
        }

        .form-control{
            border-radius:12px;
            padding:12px;
        }

        .titulo{
            font-weight:bold;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-4 col-md-6">

            <div class="card shadow-lg login-card">

                <div class="card-header">

                    <div class="logo">
                        ⚽
                    </div>

                    <h3 class="titulo mb-0">
                        Polla Mundialista 2026
                    </h3>

                    <small>
                        Inicia sesión para continuar
                    </small>

                </div>

                <div class="card-body p-4">

                    {% with messages = get_flashed_messages() %}
                        {% if messages %}

                            {% for message in messages %}

                            <div class="alert alert-danger">

                                {{ message }}

                            </div>

                            {% endfor %}

                        {% endif %}
                    {% endwith %}

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">

                                Correo electrónico

                            </label>

                            <div class="input-group">

                                <span class="input-group-text">
                                    <i class="bi bi-envelope-fill"></i>
                                </span>

                                <input type="email"
                                       name="correo"
                                       class="form-control"
                                       required
                                       placeholder="correo@ejemplo.com">

                            </div>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Contraseña

                            </label>

                            <div class="input-group">

                                <span class="input-group-text">
                                    <i class="bi bi-lock-fill"></i>
                                </span>

                                <input type="password"
                                       name="password"
                                       class="form-control"
                                       required
                                       placeholder="********">

                            </div>

                        </div>

                        <button type="submit"
                                class="btn btn-primary w-100 btn-login mb-3">

                            <i class="bi bi-box-arrow-in-right"></i>

                            Ingresar

                        </button>

                    </form>

                    <hr>

                    <div class="text-center">

                        <p class="text-muted mb-3">

                            ¿No tienes cuenta?

                        </p>

                        <a href="{{ url_for('registro') }}"
                           class="btn btn-outline-success w-100 btn-register">

                            <i class="bi bi-person-plus-fill"></i>

                            Registrarme

                        </a>

                    </div>

                </div>

                <div class="card-footer text-center bg-light">

                    <small class="text-muted">

                        Polla Mundialista 2026 • Desarrollado Por Ing. Felipe Ramirez

                    </small>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
